<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background rounded square -->
  <rect width="100" height="100" rx="14" fill="#1B4F72"/>
  <!-- Invoice/document shape -->
  <rect x="28" y="18" width="44" height="54" rx="4" fill="white" opacity="0.15"/>
  <rect x="28" y="18" width="44" height="54" rx="4" stroke="white" stroke-width="2"/>
  <!-- QR-like grid (ZATCA e-invoice symbol) -->
  <rect x="34" y="30" width="10" height="10" rx="1" fill="white"/>
  <rect x="46" y="30" width="4" height="4" rx="0.5" fill="white"/>
  <rect x="52" y="30" width="4" height="4" rx="0.5" fill="white"/>
  <rect x="46" y="36" width="4" height="4" rx="0.5" fill="white"/>
  <rect x="52" y="36" width="4" height="4" rx="0.5" fill="white"/>
  <rect x="58" y="30" width="10" height="10" rx="1" fill="white"/>
  <!-- Lines representing invoice text -->
  <rect x="34" y="46" width="32" height="2.5" rx="1.25" fill="white" opacity="0.7"/>
  <rect x="34" y="51" width="24" height="2.5" rx="1.25" fill="white" opacity="0.7"/>
  <rect x="34" y="56" width="28" height="2.5" rx="1.25" fill="white" opacity="0.7"/>
  <!-- Saudi Riyal symbol (ر.س) at bottom -->
  <circle cx="50" cy="84" r="10" fill="#F0B429"/>
  <text x="50" y="88" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#1B4F72" text-anchor="middle">ر.س</text>
</svg>
